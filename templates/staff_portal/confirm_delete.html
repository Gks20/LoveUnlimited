{% extends 'staff_portal/base.html' %}
{% block title %}Confirm Removal{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card staff-form-card">
                <div class="card-body p-4 p-md-5 text-center">
                    <i class="fas fa-exclamation-triangle text-warning fa-4x mb-4" aria-hidden="true"></i>
                    <h1 class="staff-page-title h3">Are you sure?</h1>
                    <p class="fs-5 text-muted mb-2">You are about to remove:</p>
                    <p class="fs-4 fw-semibold mb-4">{{ object }}</p>
                    <p class="text-muted mb-4">This cannot be undone.</p>
                    <form method="post" class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-lg px-4">Yes, Remove It</button>
                        <a href="{{ cancel_url }}" class="btn btn-outline-secondary btn-lg px-4">No, Go Back</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
