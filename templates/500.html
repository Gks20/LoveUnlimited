{% extends 'base.html' %}

{% block title %}Something Went Wrong - Love Unlimited{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-lg-6 mx-auto text-center py-5">
            <i class="fas fa-heart-broken fa-4x text-danger mb-4" aria-hidden="true"></i>
            <h1 class="display-5 mb-3">Something Went Wrong</h1>
            <p class="lead text-muted mb-4">
                We're sorry — something unexpected happened on our end. Please try again in a moment.
            </p>
            <div class="d-flex flex-wrap justify-content-center gap-3">
                <a href="{% url 'frontend:home' %}" class="btn btn-primary btn-lg">
                    <i class="fas fa-home me-2" aria-hidden="true"></i>Go Home
                </a>
                <a href="{% url 'frontend:contact' %}" class="btn btn-outline-primary btn-lg">
                    <i class="fas fa-envelope me-2" aria-hidden="true"></i>Contact Us
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
